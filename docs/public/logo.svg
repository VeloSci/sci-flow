<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/> <!-- Cyan-500 -->
      <stop offset="100%" style="stop-color:#3b82f6"/> <!-- Blue-500 -->
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Hexagonal frame -->
  <path d="M32 4L56 18V46L32 60L8 46V18L32 4Z" stroke="url(#logoGrad)" stroke-width="2.5" fill="none" filter="url(#glow)"/>
  
  <!-- Stylized Flow Graph -->
  <!-- Start Node -->
  <circle cx="22" cy="24" r="3" fill="url(#logoGrad)" filter="url(#glow)"/>
  <!-- End Node -->
  <circle cx="42" cy="40" r="3" fill="url(#logoGrad)" filter="url(#glow)"/>
  
  <!-- Connecting Flow Line -->
  <path d="M25 24 C32 24, 32 40, 39 40" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  
  <!-- Flow indicator (arrowhead) -->
  <path d="M37 37 L40 40 L37 43" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Accent particles -->
  <circle cx="32" cy="32" r="1" fill="#06b6d4" opacity="0.6"/>
  <circle cx="48" cy="20" r="1.5" fill="#3b82f6" opacity="0.4" filter="url(#glow)"/>
</svg>
