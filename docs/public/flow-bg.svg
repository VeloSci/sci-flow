<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice" fill="none">
  <defs>
    <!-- Brand Gradients -->
    <linearGradient id="flowGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4; stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#3b82f6; stop-opacity:0.4"/>
    </linearGradient>
    
    <linearGradient id="streamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4; stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#10b981; stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3b82f6; stop-opacity:0"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="extremeBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25" />
    </filter>
    
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="hexGrid" width="60" height="104" patternUnits="userSpaceOnUse" patternTransform="scale(1.5)">
      <path d="M30 0 L60 17.3 L60 51.9 L30 69.2 L0 51.9 L0 17.3 Z" stroke="#e2e8f0" stroke-width="0.5" fill="none" />
    </pattern>

    <style>
      .drift-wrapper { animation: drift 20s ease-in-out infinite alternate; }
      .node-A { animation-delay: 0s; }
      .node-B { animation-delay: -5s; }
      .node-C { animation-delay: -10s; }
      .node-D { animation-delay: -3s; }
      .node-E { animation-delay: -7s; }

      @keyframes drift {
        from { transform: translate(0, 0); }
        to { transform: translate(25px, 20px); }
      }

      .edge-dash { stroke-dasharray: 8 8; animation: flowDash 20s linear infinite; }
      @keyframes flowDash { to { stroke-dashoffset: -200; } }

      .edge-pulse { animation: pulseEdge 4s ease-in-out infinite; }
      @keyframes pulseEdge { 0%, 100% { opacity: 0.2; stroke-width: 1; } 50% { opacity: 0.8; stroke-width: 3; } }

      .edge-particle { stroke-dasharray: 4 400; animation: particleFlow 6s linear infinite; }
      @keyframes particleFlow { from { stroke-dashoffset: 400; } to { stroke-dashoffset: 0; } }
      
      .skeleton-bar { fill: #94a3b8; opacity: 0.3; rx: 2; }
      .skeleton-title { fill: #06b6d4; opacity: 0.4; rx: 3; }
      .skeleton-action { fill: #3b82f6; opacity: 0.3; rx: 4; }
    </style>
  </defs>

  <!-- Background Base (Fully Transparent) -->
  <rect width="100%" height="100%" fill="url(#hexGrid)" />

  <!-- Ambient Glow -->
  <circle cx="50%" cy="50%" r="600" fill="url(#flowGrad1)" opacity="0.1" filter="url(#extremeBlur)" />

  <!-- Node Visual Elements (Ports and Skeletons) -->
  
  <!-- Group A (Top Left) -->
  <g transform="translate(150, 100)">
    <g class="drift-wrapper node-A">
      <rect width="160" height="120" rx="8" fill="#1e293b" fill-opacity="0.9" filter="url(#extremeBlur)" />
      <!-- Skeleton UI -->
      <rect x="15" y="15" width="80" height="10" class="skeleton-title" />
      <rect x="15" y="32" width="130" height="6" class="skeleton-bar" />
      <rect x="15" y="42" width="110" height="6" class="skeleton-bar" />
      <circle cx="20" cy="100" r="4" class="skeleton-action" />
      <circle cx="35" cy="100" r="4" class="skeleton-action" />
      <!-- Ports -->
      <circle cx="160" cy="40" r="4" fill="#06b6d4" opacity="0.7" />
      <circle cx="160" cy="80" r="4" fill="#06b6d4" opacity="0.7" />
    </g>
  </g>

  <!-- Group D (Bottom Left) -->
  <g transform="translate(100, 550)">
    <g class="drift-wrapper node-D">
      <rect width="170" height="130" rx="8" fill="#1e293b" fill-opacity="0.9" filter="url(#extremeBlur)" />
      <rect x="15" y="15" width="90" height="10" class="skeleton-title" />
      <rect x="15" y="32" width="140" height="6" class="skeleton-bar" />
      <rect x="15" y="42" width="120" height="6" class="skeleton-bar" />
      <circle cx="20" cy="110" r="5" class="skeleton-action" />
      <!-- Ports -->
      <circle cx="170" cy="50" r="4" fill="#10b981" opacity="0.7" />
      <circle cx="170" cy="90" r="4" fill="#10b981" opacity="0.7" />
    </g>
  </g>

  <!-- Group B (Center) -->
  <g transform="translate(600, 280)">
    <g class="drift-wrapper node-B">
      <rect width="220" height="180" rx="10" fill="#1e293b" fill-opacity="0.9" filter="url(#extremeBlur)" />
      <rect x="20" y="20" width="120" height="12" class="skeleton-title" style="fill: #10b981;" />
      <rect x="20" y="45" width="180" height="6" class="skeleton-bar" />
      <rect x="20" y="55" width="160" height="6" class="skeleton-bar" />
      <rect x="20" y="65" width="170" height="6" class="skeleton-bar" />
      <rect x="20" y="150" width="40" height="10" class="skeleton-action" />
      <!-- Ports: 3 In (Left), 5 Out (Right) -->
      <circle cx="0" cy="40" r="5" fill="#3b82f6" opacity="0.8" />
      <circle cx="0" cy="90" r="5" fill="#3b82f6" opacity="0.8" />
      <circle cx="0" cy="140" r="5" fill="#3b82f6" opacity="0.8" />
      
      <circle cx="220" cy="30" r="5" fill="#10b981" opacity="0.8" />
      <circle cx="220" cy="65" r="5" fill="#10b981" opacity="0.8" />
      <circle cx="220" cy="100" r="5" fill="#10b981" opacity="0.8" />
      <circle cx="220" cy="135" r="5" fill="#10b981" opacity="0.8" />
      <circle cx="220" cy="170" r="5" fill="#10b981" opacity="0.8" />
    </g>
  </g>

  <!-- Group E (Top Right) -->
  <g transform="translate(1100, 50)">
    <g class="drift-wrapper node-E">
      <rect width="190" height="150" rx="10" fill="#1e293b" fill-opacity="0.9" filter="url(#extremeBlur)" />
      <rect x="20" y="20" width="100" height="10" class="skeleton-title" style="fill: #3b82f6;" />
      <rect x="20" y="38" width="150" height="6" class="skeleton-bar" />
      <rect x="20" y="48" width="130" height="6" class="skeleton-bar" />
      <circle cx="25" cy="130" r="6" class="skeleton-action" />
      <circle cx="45" cy="130" r="6" class="skeleton-action" />
      <!-- Ports -->
      <circle cx="0" cy="50" r="4" fill="#3b82f6" opacity="0.7" />
      <circle cx="0" cy="100" r="4" fill="#3b82f6" opacity="0.7" />
    </g>
  </g>

  <!-- Group C (Bottom Right) -->
  <g transform="translate(1050, 500)">
    <g class="drift-wrapper node-C">
      <rect width="180" height="140" rx="8" fill="#1e293b" fill-opacity="0.9" filter="url(#extremeBlur)" />
      <rect x="15" y="15" width="90" height="10" class="skeleton-title" />
      <rect x="15" y="32" width="140" height="6" class="skeleton-bar" />
      <rect x="15" y="42" width="120" height="6" class="skeleton-bar" />
      <circle cx="20" cy="115" r="5" class="skeleton-action" />
      <!-- Ports -->
      <circle cx="0" cy="70" r="5" fill="#10b981" opacity="0.7" />
    </g>
  </g>

  <!-- Animated Edges (Conceptual connections between regions) -->
  <g stroke="#06b6d4" fill="none" opacity="0.4" filter="url(#softGlow)">
    <!-- A -> B -->
    <path d="M310,140 C450,140 450,320 600,320" class="edge-dash" />
    <path d="M310,180 C500,180 500,370 600,370" class="edge-particle" style="stroke: #10b981; stroke-width: 3;" />
    
    <!-- D -> B -->
    <path d="M270,600 C450,600 450,420 600,420" class="edge-dash" style="stroke: #10b981;" />
    
    <!-- B -> C -->
    <path d="M820,380 C950,380 950,570 1050,570" class="edge-pulse" style="stroke: #3b82f6; stroke-width: 2;" />
    
    <!-- B -> E -->
    <path d="M820,310 C950,310 950,150 1100,150" class="edge-particle" style="stroke: #06b6d4;" />
    <path d="M820,345 C1000,345 1000,100 1100,100" class="edge-dash" />

    <!-- Cross Logic -->
    <path d="M820,415 C950,415 950,570 1050,570" class="edge-dash" style="opacity: 0.8;" />
    <path d="M820,450 C1000,450 1000,600 1230,600" class="edge-particle" style="stroke: #3b82f6; stroke-width: 2;" />
  </g>
</svg>
